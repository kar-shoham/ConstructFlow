services:
  # --- Infrastructure ---
  discovery-service:
    build: ./discovery-service
    restart: always
    ports:
      - "8580:8580"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  config-service:
    build: ./config-service
    restart: always
    depends_on:
      - discovery-service
    ports:
      - "8590:8590"
    environment:
      - GIT_PASSWORD=${GIT_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8580/eureka/

  # --- Databases ---
  cf-user-db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: cf_user_db
    volumes:
      - ./db-volumes/user-volume:/var/lib/postgresql/data/

  cf-entity-db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: cf_entity_db
    volumes:
      - ./db-volumes/entity-volume:/var/lib/postgresql/data/

  cf-timesheet-db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: cf_timesheet_db
    volumes:
      - ./db-volumes/timesheet-volume:/var/lib/postgresql/data/

  cf-payroll-db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: cf_payroll_db
    volumes:
      - ./db-volumes/payroll-volume:/var/lib/postgresql/data/

  # --- Services ---
  api-gateway-service:
    build: ./api-gateway-service
    restart: always
    depends_on:
      - config-service
    ports:
      - "8680:8680"
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8590
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8580/eureka/
      - JAVA_OPTS=-Xmx512m -Xms256m

  user-service:
    build: ./user-service
    restart: always
    depends_on:
      - cf-user-db
      - config-service
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8590
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cf-user-db:5432/cf_user_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8580/eureka/
      - JAVA_OPTS=-Xmx512m -Xms256m

  entity-service:
    build: ./entity-service
    restart: always
    depends_on:
      - cf-entity-db
      - config-service
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8590
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cf-entity-db:5432/cf_entity_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8580/eureka/
      - JAVA_OPTS=-Xmx512m -Xms256m

  timesheet-service:
    build: ./timesheet-service
    restart: always
    depends_on:
      - cf-timesheet-db
      - config-service
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8590
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cf-timesheet-db:5432/cf_timesheet_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8580/eureka/
      - JAVA_OPTS=-Xmx512m -Xms256m

  payroll-service:
    build: ./payroll-service
    restart: always
    depends_on:
      - cf-payroll-db
      - config-service
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-service:8590
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cf-payroll-db:5432/cf_payroll_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8580/eureka/
      - JAVA_OPTS=-Xmx512m -Xms256m

  # --- Frontend ---
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api-gateway-service

networks:
  default:
    name: constructflow-network